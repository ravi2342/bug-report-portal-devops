apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - app-configmap.yaml
  - app-secret.template.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - app-deployment.yaml
  - app-service.yaml
  - ingress.yaml

# Image patching configuration for dynamic Docker Hub updates
# This allows Jenkins to inject the build-specific image tag at runtime
# The actual image name/tag is set by k8sDeploy function via: kustomize edit set image
images:
  - name: bugreportportal
    # newName and newTag are set dynamically by k8sDeploy stage
    # Do not hardcode here - will be overridden at runtime
