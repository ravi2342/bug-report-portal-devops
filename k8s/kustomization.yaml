apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - app-configmap.yaml
  - app-secret.template.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - uploads-pvc.yaml
  - app-deployment.yaml
  - app-service.yaml
  - ingress.yaml

# Image patching configuration for dynamic Docker Hub updates
# This allows Jenkins to inject the build-specific image tag
images:
  - name: bugreportportal
    newName: demu147/bugreportportal
    newTag: latest  # Will be overridden by Jenkinsfile via kustomize edit
