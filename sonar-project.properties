sonar.projectKey=bug-report-portal
sonar.projectName=Bug Report Portal
sonar.projectVersion=1.0

sonar.sources=app
sonar.exclusions=**/node_modules/**,**/uploads/**,**/data/**,**/prisma/migrations/**,.git/**,**/dist/**,**/build/**,**/coverage/**,app/tests/**,app/printReports.js,app/prisma/**,app/views/**,app/public/**

# Tests
sonar.tests=app/tests
sonar.test.inclusions=app/tests/**/*.test.js

# Coverage (LCOV produced by Jest with --coverage)
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info
sonar.coverage.exclusions=app/tests/**,app/printReports.js,app/prisma/**,app/views/**,app/public/**,app/seed-demo.js

sonar.sourceEncoding=UTF-8
